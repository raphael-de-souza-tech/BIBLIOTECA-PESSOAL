<!DOCTYPE html>
<html lang="PT-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="./src/Icone.png" type="image/x-icon">
    <link rel="stylesheet" href="./src/styles.css">
    <title>BIBLIOTECA</title>
</head>
<body>
    <div class="banner">
        <h1>Sua Biblioteca Pessoal</h1>
        <h2>Liste aqui seus livros.</h2>
        <img src="./src/background01.jpg" alt="">
    </div> 
    <div id="container" class="header">
        <input type="text" id="myInput" placeholder="Nome do Livro">
        <span onclick="newElement()" class="addBtn">Adicionar Livro</span>
    </div>

    <div class="lista">
        <ul id="minhaUL">
            <li>Bíblia</li>
            <li>Morro dos ventos uivantes</li>
            <li>Frequência Vibracional</li>
            <li>O Caibalion</li>
        </ul>
    </div>

    <div class="button-container">
        <button id="info-btn" onclick="getInfo()">Informações sobre o livro 📚</button>
    </div>
    <div id="output"></div>


    <script src="./src/app.js"></script>
</body>  
</html>
